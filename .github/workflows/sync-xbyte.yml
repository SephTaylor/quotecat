name: Weekly X-Byte Price Sync

on:
  schedule:
    # Every Friday at 14:00 UTC (8:00 AM CST)
    - cron: '0 14 * * 5'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI
    inputs:
      date:
        description: 'Date to sync (YYYY_MM_DD format, leave empty for today)'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run X-Byte Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SYNC_DATE: ${{ github.event.inputs.date }}
        run: node scripts/sync-xbyte.js

      - name: Send Success Email
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: node scripts/send-sync-notification.js success

      - name: Send Failure Email
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: node scripts/send-sync-notification.js failure
